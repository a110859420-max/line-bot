<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>預約行事曆</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #070708;
      --card: rgba(8, 10, 16, 0.88);
      --card-2: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --accent: #ff9a3c;
      --accent-2: #ffb347;
      --success: #18a15f;
      --danger: #d75050;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(255,120,0,0.12), transparent 26%),
        radial-gradient(circle at top left, rgba(255,140,0,0.12), transparent 25%),
        #050506;
      min-height: 100vh;
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(7,11,18,.95), rgba(6,8,13,.88));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 12px 38px rgba(0,0,0,.35);
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 14px;
      background: rgba(0,0,0,.22);
      box-shadow: 0 0 18px rgba(255, 180, 80, .22), 0 0 36px rgba(255, 140, 66, .14);
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 19px;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand-title .accent {
      color: var(--accent);
    }

    .brand-sub {
      font-size: 12px;
      color: #d8b07a;
      font-weight: 700;
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .month-title {
      min-width: 140px;
      text-align: center;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      font-weight: 800;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: .18s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #111;
      border: none;
    }

    .btn.success {
      background: rgba(19, 147, 86, .18);
      border-color: rgba(53, 201, 120, .28);
      color: #cffff0;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(360px, .95fr);
      gap: 16px;
    }

    .panel {
      background: rgba(8, 10, 16, 0.88);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 12px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--accent);
    }

    .panel-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .calendar-wrap {
      padding: 0 18px 18px;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday {
      text-align: center;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 800;
      color: #e5b885;
    }

    .day {
      min-height: 124px;
      border-radius: 18px;
      padding: 10px;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.06);
      cursor: pointer;
      transition: .18s ease;
      overflow: hidden;
    }

    .day:hover {
      transform: translateY(-2px);
      border-color: rgba(255,154,60,.45);
    }

    .day.is-selected {
      border-color: rgba(255,154,60,.85);
      box-shadow: inset 0 0 0 1px rgba(255,154,60,.28);
      background: rgba(255,154,60,.06);
    }

    .day.is-other {
      opacity: .28;
      cursor: default;
    }

    .day-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .day-num {
      font-size: 14px;
      font-weight: 900;
    }

    .count {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      color: #ffd8b4;
      background: rgba(255,154,60,.16);
      border: 1px solid rgba(255,154,60,.25);
    }

    .mini-item {
      padding: 4px 7px;
      margin-bottom: 4px;
      border-radius: 9px;
      background: rgba(255,255,255,.05);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f1f1f1;
    }

    .detail {
      padding: 18px;
      height: 100%;
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .detail-empty {
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
      padding: 12px 4px;
    }

    .booking-card {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .booking-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .booking-name {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,154,60,.14);
      border: 1px solid rgba(255,154,60,.24);
      font-size: 12px;
      font-weight: 800;
      color: #ffd3aa;
    }

    .booking-meta {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #ececec;
      line-height: 1.55;
    }

    .muted {
      color: var(--muted);
    }

    .field {
      margin-top: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 800;
      color: #dfdfdf;
    }

    .field input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.28);
      color: #fff;
      outline: none;
    }

    .field input:focus {
      border-color: rgba(255,154,60,.75);
      box-shadow: 0 0 0 3px rgba(255,154,60,.10);
    }

    .card-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .save {
      min-width: 96px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #111;
      font-weight: 900;
      cursor: pointer;
    }

    .status {
      font-size: 13px;
      color: #9de5af;
      min-height: 18px;
    }

    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr; }
      .detail { max-height: none; }
    }

    @media (max-width: 780px) {
      .topbar { grid-template-columns: 1fr; }
      .toolbar { justify-content: flex-start; }
      .day { min-height: 100px; }
      .mini-item { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img src="/logo.png" alt="富星車美 LOGO" class="brand-logo" onerror="this.style.display='none'" />
        <div>
          <div class="brand-title">富星車美 <span class="accent">｜行事曆後台</span></div>
          <div class="brand-sub">PRIVATE BOOKING CALENDAR</div>
        </div>
      </div>

      <div class="toolbar">
        <a href="/admin.html" class="btn">回列表</a>
        <button type="button" class="btn" onclick="changeMonth(-1)">上個月</button>
        <div class="month-title" id="monthTitle">2026 / 04</div>
        <button type="button" class="btn" onclick="changeMonth(1)">下個月</button>
        <button type="button" class="btn success" onclick="goToday()">今天</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">月曆檢視</div>
            <div class="panel-sub">點選日期後，可補填實際時間與牽車地點</div>
          </div>
        </div>

        <div class="calendar-wrap">
          <div class="weekdays">
            <div class="weekday">日</div>
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
          </div>
          <div class="days" id="calendarGrid"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="detail" id="detailPanel">
          <div class="panel-title" id="detailTitle">當日預約</div>
          <div class="panel-sub" id="detailSub">請先點選左側日期</div>
          <div id="detailList" class="detail-empty">這邊會顯示該日所有預約，並可直接儲存實際時間與牽車地點。</div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    let allBookings = [];
    let currentDate = new Date();
    let selectedDateStr = '';

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatDateLocal(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadBookings() {
      const res = await fetch('/api/get-bookings');
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || '讀取失敗');
      allBookings = Array.isArray(data.bookings) ? data.bookings : [];
    }

    function getBookingsByDate(dateStr) {
      return allBookings.filter(item => item.booking_date === dateStr);
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthTitle').textContent = `${year} / ${pad(month + 1)}`;

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const firstWeekday = firstDay.getDay();
      const totalDays = lastDay.getDate();
      const prevLastDay = new Date(year, month, 0).getDate();

      for (let i = 0; i < firstWeekday; i++) {
        const div = document.createElement('div');
        div.className = 'day is-other';
        div.innerHTML = `<div class="day-top"><div class="day-num">${prevLastDay - firstWeekday + i + 1}</div></div>`;
        grid.appendChild(div);
      }

      for (let day = 1; day <= totalDays; day++) {
        const dateObj = new Date(year, month, day);
        const dateStr = formatDateLocal(dateObj);
        const list = getBookingsByDate(dateStr);

        const div = document.createElement('div');
        div.className = 'day' + (selectedDateStr === dateStr ? ' is-selected' : '');

        let html = `<div class="day-top"><div class="day-num">${day}</div>${list.length ? `<div class="count">${list.length} 筆</div>` : ''}</div>`;
        list.slice(0, 3).forEach(item => {
          const name = escapeHtml(item.customer_name || '未命名');
          const slot = escapeHtml(item.booking_time || '');
          const actual = item.actual_time ? `｜${escapeHtml(item.actual_time)}` : '';
          html += `<div class="mini-item">${name}｜${slot}${actual}</div>`;
        });
        div.innerHTML = html;
        div.onclick = () => {
          selectedDateStr = dateStr;
          renderCalendar();
          renderDetail(dateStr);
        };
        grid.appendChild(div);
      }

      const usedCells = firstWeekday + totalDays;
      const remain = usedCells % 7 === 0 ? 0 : 7 - (usedCells % 7);
      for (let i = 1; i <= remain; i++) {
        const div = document.createElement('div');
        div.className = 'day is-other';
        div.innerHTML = `<div class="day-top"><div class="day-num">${i}</div></div>`;
        grid.appendChild(div);
      }
    }

    function renderDetail(dateStr) {
      document.getElementById('detailTitle').textContent = `${dateStr} 當日預約`;
      document.getElementById('detailSub').textContent = '可直接補填實際時間與牽車地點';
      const list = getBookingsByDate(dateStr);
      const container = document.getElementById('detailList');

      if (!list.length) {
        container.className = 'detail-empty';
        container.innerHTML = '這一天沒有預約';
        return;
      }

      container.className = '';
      container.innerHTML = list.map(item => {
        const id = escapeHtml(item.id ?? item.booking_token ?? '');
        return `
          <div class="booking-card">
            <div class="booking-head">
              <div>
                <div class="booking-name">${escapeHtml(item.customer_name || '未命名')}</div>
                <div class="chips">
                  <span class="chip">📅 ${escapeHtml(item.booking_date || '')}</span>
                  <span class="chip">🕒 ${escapeHtml(item.booking_time || '')}</span>
                </div>
              </div>
            </div>

            <div class="booking-meta">
              <div><strong>電話：</strong> ${escapeHtml(item.customer_phone || '')}</div>
              <div><strong>LINE ID：</strong> ${escapeHtml(item.customer_line || '')}</div>
              <div><strong>車型：</strong> ${escapeHtml(item.vehicle_type || '')}</div>
              <div><strong>服務：</strong> ${escapeHtml(item.service_name || '')}</div>
              <div><strong>備註：</strong> <span class="muted">${escapeHtml(item.note || '無')}</span></div>
            </div>

            <div class="field">
              <label for="actual_time_${id}">實際時間</label>
              <input id="actual_time_${id}" type="text" value="${escapeHtml(item.actual_time || '')}" placeholder="例如：09:30" />
            </div>

            <div class="field">
              <label for="pickup_location_${id}">牽車地點</label>
              <input id="pickup_location_${id}" type="text" value="${escapeHtml(item.pickup_location || '')}" placeholder="例如：嘉義市西區XX路XX號" />
            </div>

            <div class="card-actions">
              <button class="save" type="button" onclick="updateBookingDetail('${id}')">儲存</button>
              <div class="status" id="status_${id}"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function updateBookingDetail(id) {
      const actualInput = document.getElementById(`actual_time_${id}`);
      const locationInput = document.getElementById(`pickup_location_${id}`);
      const statusEl = document.getElementById(`status_${id}`);

      if (!actualInput || !locationInput || !statusEl) return;
      statusEl.textContent = '儲存中...';

      try {
        const res = await fetch('/api/update-booking-detail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id,
            actual_time: actualInput.value.trim(),
            pickup_location: locationInput.value.trim()
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '更新失敗');

        const found = allBookings.find(item => String(item.id ?? item.booking_token) === String(id));
        if (found) {
          found.actual_time = actualInput.value.trim();
          found.pickup_location = locationInput.value.trim();
        }
        statusEl.textContent = '已儲存';
        renderCalendar();
      } catch (err) {
        statusEl.textContent = `儲存失敗：${err.message}`;
      }
    }

    function changeMonth(offset) {
      currentDate.setMonth(currentDate.getMonth() + offset);
      selectedDateStr = '';
      renderCalendar();
      document.getElementById('detailTitle').textContent = '當日預約';
      document.getElementById('detailSub').textContent = '請先點選左側日期';
      document.getElementById('detailList').className = 'detail-empty';
      document.getElementById('detailList').innerHTML = '這邊會顯示該日所有預約，並可直接儲存實際時間與牽車地點。';
    }

    function goToday() {
      currentDate = new Date();
      selectedDateStr = formatDateLocal(new Date());
      renderCalendar();
      renderDetail(selectedDateStr);
    }

    (async function init() {
      try {
        await loadBookings();
        selectedDateStr = formatDateLocal(new Date());
        renderCalendar();
        renderDetail(selectedDateStr);
      } catch (err) {
        document.getElementById('detailTitle').textContent = '讀取失敗';
        document.getElementById('detailSub').textContent = '';
        document.getElementById('detailList').className = 'detail-empty';
        document.getElementById('detailList').textContent = err.message;
      }
    })();
  </script>
</body>
</html>
