<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>預約行事曆</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: #0b0b0d;
      color: #fff;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 28px;
      color: #ff9a3c;
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: #ccc;
      font-size: 14px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: linear-gradient(135deg, #ff8a2a, #ffb347);
      color: #111;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn.secondary {
      background: #1c1c20;
      color: #fff;
      border: 1px solid rgba(255,255,255,.12);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .calendar-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .weekday {
      text-align: center;
      font-weight: 700;
      color: #ffb36b;
      padding: 8px 0;
    }

    .day-cell {
      min-height: 120px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 10px;
      cursor: pointer;
      transition: .2s ease;
      overflow: hidden;
    }

    .day-cell:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 154, 60, .6);
    }

    .day-cell.other-month {
      opacity: .25;
    }

    .day-cell.selected {
      border: 1px solid #ff9a3c;
      box-shadow: 0 0 0 1px rgba(255,154,60,.25) inset;
    }

    .day-number {
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .event-badge {
      background: rgba(255,154,60,.16);
      border: 1px solid rgba(255,154,60,.35);
      color: #ffd3a6;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 8px;
    }

    .event-item-mini {
      font-size: 12px;
      line-height: 1.4;
      padding: 4px 6px;
      margin-bottom: 4px;
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-title {
      margin: 0 0 14px;
      font-size: 20px;
      color: #ff9a3c;
    }

    .booking-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .booking-main {
      margin-bottom: 12px;
      line-height: 1.7;
      font-size: 14px;
    }

    .booking-main strong {
      color: #ffcc98;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #ddd;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color: #fff;
      outline: none;
    }

    .field input:focus {
      border-color: #ff9a3c;
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff8a2a, #ffb347);
      color: #111;
      font-weight: 800;
      cursor: pointer;
    }

    .empty-text {
      color: #bbb;
      font-size: 14px;
      line-height: 1.7;
    }

    .status {
      font-size: 13px;
      margin-top: 8px;
      color: #9ee6a0;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .calendar-grid {
        gap: 6px;
      }

      .day-cell {
        min-height: 88px;
        padding: 8px;
      }

      .event-item-mini {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title-wrap">
        <h1>預約行事曆</h1>
        <p>查看每月預約，並補填實際時間與牽車地點</p>
      </div>

      <div class="nav-buttons">
        <a href="/admin.html" class="btn secondary">回後台列表</a>
        <button class="btn secondary" onclick="changeMonth(-1)">上個月</button>
        <button class="btn secondary" onclick="changeMonth(1)">下個月</button>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="calendar-header">
          <div class="calendar-title" id="calendarTitle">2026 年 4 月</div>
        </div>

        <div class="calendar-grid" id="weekdayRow">
          <div class="weekday">日</div>
          <div class="weekday">一</div>
          <div class="weekday">二</div>
          <div class="weekday">三</div>
          <div class="weekday">四</div>
          <div class="weekday">五</div>
          <div class="weekday">六</div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <div class="card">
        <h2 class="side-title" id="detailTitle">當日預約</h2>
        <div id="bookingList" class="empty-text">請先點選左側日期</div>
      </div>
    </div>
  </div>

  <script>
    let allBookings = [];
    let currentDate = new Date();
    let selectedDateStr = "";

    async function loadBookings() {
      try {
        const res = await fetch('/api/get-bookings');
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || '讀取預約失敗');
        }

        allBookings = Array.isArray(data.bookings) ? data.bookings : [];
        renderCalendar();
      } catch (err) {
        document.getElementById('bookingList').innerHTML =
          '<div class="empty-text">讀取資料失敗：' + err.message + '</div>';
      }
    }

    function formatDateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getBookingsByDate(dateStr) {
      return allBookings.filter(item => item.booking_date === dateStr);
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('calendarTitle').textContent = `${year} 年 ${month + 1} 月`;

      const calendarGrid = document.getElementById('calendarGrid');
      calendarGrid.innerHTML = '';

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startWeekday = firstDay.getDay();
      const totalDays = lastDay.getDate();

      const prevMonthLastDay = new Date(year, month, 0).getDate();

      for (let i = 0; i < startWeekday; i++) {
        const day = prevMonthLastDay - startWeekday + i + 1;
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = `<div class="day-number">${day}</div>`;
        calendarGrid.appendChild(cell);
      }

      for (let day = 1; day <= totalDays; day++) {
        const dateObj = new Date(year, month, day);
        const dateStr = formatDateLocal(dateObj);
        const bookings = getBookingsByDate(dateStr);

        const cell = document.createElement('div');
        cell.className = 'day-cell';
        if (dateStr === selectedDateStr) {
          cell.classList.add('selected');
        }

        let innerHTML = `<div class="day-number">${day}</div>`;

        if (bookings.length > 0) {
          innerHTML += `<div class="event-badge">${bookings.length} 筆預約</div>`;
          bookings.slice(0, 3).forEach(item => {
            const name = item.customer_name || '未命名';
            const slot = item.booking_time || '';
            const actual = item.actual_time ? `｜${item.actual_time}` : '';
            innerHTML += `<div class="event-item-mini">${name}｜${slot}${actual}</div>`;
          });
        }

        cell.innerHTML = innerHTML;
        cell.onclick = () => {
          selectedDateStr = dateStr;
          renderCalendar();
          renderBookingList(dateStr);
        };

        calendarGrid.appendChild(cell);
      }

      const totalCells = startWeekday + totalDays;
      const remain = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);

      for (let i = 1; i <= remain; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = `<div class="day-number">${i}</div>`;
        calendarGrid.appendChild(cell);
      }
    }

    function renderBookingList(dateStr) {
      const list = getBookingsByDate(dateStr);
      const bookingList = document.getElementById('bookingList');
      document.getElementById('detailTitle').textContent = `${dateStr} 預約明細`;

      if (list.length === 0) {
        bookingList.innerHTML = '<div class="empty-text">這一天沒有預約</div>';
        return;
      }

      bookingList.innerHTML = list.map(item => `
        <div class="booking-card">
          <div class="booking-main">
            <div><strong>姓名：</strong>${item.customer_name || ''}</div>
            <div><strong>電話：</strong>${item.customer_phone || ''}</div>
            <div><strong>LINE ID：</strong>${item.customer_line || ''}</div>
            <div><strong>車型：</strong>${item.vehicle_type || ''}</div>
            <div><strong>服務：</strong>${item.service_name || ''}</div>
            <div><strong>時段：</strong>${item.booking_time || ''}</div>
            <div><strong>備註：</strong>${item.note || '無'}</div>
          </div>

          <div class="field">
            <label for="actual_time_${item.id}">實際時間</label>
            <input type="text" id="actual_time_${item.id}" value="${item.actual_time || ''}" placeholder="例如：09:30">
          </div>

          <div class="field">
            <label for="pickup_location_${item.id}">牽車地點</label>
            <input type="text" id="pickup_location_${item.id}" value="${item.pickup_location || ''}" placeholder="例如：嘉義市西區XX路XX號">
          </div>

          <button class="save-btn" onclick="updateBookingDetail('${item.id}')">儲存</button>
          <div class="status" id="status_${item.id}"></div>
        </div>
      `).join('');
    }

    async function updateBookingDetail(id) {
      const actualTime = document.getElementById(`actual_time_${id}`).value.trim();
      const pickupLocation = document.getElementById(`pickup_location_${id}`).value.trim();
      const statusEl = document.getElementById(`status_${id}`);

      statusEl.textContent = '儲存中...';

      try {
        const res = await fetch('/api/update-booking-detail', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            id,
            actual_time: actualTime,
            pickup_location: pickupLocation
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || '更新失敗');
        }

        statusEl.textContent = '已儲存';
        const target = allBookings.find(item => String(item.id) === String(id));
        if (target) {
          target.actual_time = actualTime;
          target.pickup_location = pickupLocation;
        }
        renderCalendar();
      } catch (err) {
        statusEl.textContent = '儲存失敗：' + err.message;
      }
    }

    function changeMonth(offset) {
      currentDate.setMonth(currentDate.getMonth() + offset);
      renderCalendar();
      document.getElementById('detailTitle').textContent = '當日預約';
      document.getElementById('bookingList').innerHTML = '<div class="empty-text">請先點選左側日期</div>';
      selectedDateStr = '';
    }

    loadBookings();
  </script>
</body>
</html>
