<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    :root {
      --bg: #0f0f0f;
      --bg-soft: #181818;
      --card: #1f1f1f;
      --card-2: #262626;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --muted: #a6a6a6;
      --orange: #ff7a00;
      --orange-2: #ff9d3d;
      --danger: #ff5b5b;
      --success: #22c55e;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top right, rgba(255, 122, 0, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(255, 122, 0, 0.08), transparent 25%),
        linear-gradient(180deg, #0b0b0b 0%, #111111 100%);
      color: var(--text);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      min-height: 100%;
    }

    body {
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding-bottom: 48px;
    }

    .hero {
      position: relative;
      background: linear-gradient(135deg, rgba(255,122,0,0.15), rgba(255,122,0,0.03));
      border: 1px solid rgba(255,122,0,0.22);
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero::after {
      content: "BOOKING";
      position: absolute;
      right: 16px;
      bottom: -8px;
      font-size: clamp(2rem, 9vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.03);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 122, 0, 0.14);
      color: #ffd4ae;
      border: 1px solid rgba(255, 122, 0, 0.24);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      line-height: 1.2;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
      max-width: 560px;
    }
