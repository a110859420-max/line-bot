<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>富星車美線上預約系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #080808;
      --bg-2: #121212;
      --panel: rgba(14, 14, 14, 0.78);
      --panel-2: rgba(22, 22, 22, 0.85);
      --border: rgba(255, 140, 66, 0.28);
      --border-strong: rgba(255, 140, 66, 0.48);
      --text: #eef2ff;
      --muted: #b8bcc7;
      --orange: #ff8c42;
      --orange-2: #ff6b1a;
      --gold: #ffcf7a;
      --red: #ff2f2f;
      --green: #00c853;
      --shadow: 0 18px 45px rgba(0,0,0,.36);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,140,66,.16), transparent 20%),
        radial-gradient(circle at 82% 10%, rgba(255,90,20,.10), transparent 18%),
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.78)),
        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1600&q=80') center/cover fixed;
      letter-spacing: .2px;
    }

    .app-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(1.5px);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(8,8,8,.84), rgba(18,18,18,.88));
      backdrop-filter: blur(12px);
      box-shadow: 0 6px 24px rgba(0,0,0,.25);
      transition: transform .3s ease, box-shadow .3s ease, background .3s ease;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(0,0,0,.22);
      box-shadow: 0 0 18px rgba(255, 180, 80, .22), 0 0 36px rgba(255, 140, 66, .14);
      flex: 0 0 auto;
      animation: logoGlow 3.2s ease-in-out infinite;
      transition: transform .28s ease, box-shadow .28s ease;
    }

    .brand h1 {
      margin: 0;
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
      font-size: clamp(1.45rem, 2.3vw, 2.35rem);
      line-height: 1.1;
      font-weight: 800;
      background: linear-gradient(90deg, #ffd49d 0%, #ff9d4d 30%, #ff6b1a 58%, #ffb35c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
      animation: titleFadeUp .9s ease both;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: clamp(.72rem, 1vw, .95rem);
      color: #ffdca9;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      opacity: .96;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .header-btn {
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.05);
      color: #fff7ef;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      transition: .22s ease;
    }

    .header-btn:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      color: #fff;
    }

    .content {
      flex: 1;
      padding: 22px 16px 34px;
    }

    .container {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .glass {
      background: linear-gradient(135deg, rgba(20,20,20,.76), rgba(12,12,12,.88));
      border: 1px solid rgba(255,140,66,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .service-philosophy {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      padding: 26px 22px;
      border-radius: 22px;
      margin-bottom: 26px;
      animation: sectionFadeUp .9s ease both;
    }

    .philosophy-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 10px 6px;
    }

    .philosophy-icon {
      font-size: 2rem;
      filter: drop-shadow(0 6px 14px rgba(255,140,66,.18));
    }

    .philosophy-text {
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
      font-size: .98rem;
      font-weight: 800;
      color: #ffd49d;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 18px;
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
      font-size: clamp(1.15rem, 1.8vw, 1.45rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #ffbf83 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 26px;
      border-radius: 4px;
      background: linear-gradient(180deg, var(--red), var(--orange));
    }

    .step-section { display: none; }
    .step-section.active { display: block; }

    .step-card {
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 22px;
    }

    .date-selector-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .date-selector-header h3 {
      margin: 0;
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
      font-size: 1.15rem;
      color: #ffc482;
    }

    .date-nav { display: flex; gap: 10px; }
    .date-nav button {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border-strong);
      background: rgba(255,140,66,.12);
      color: var(--orange);
      cursor: pointer;
      font-weight: 900;
    }

    .date-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 26px;
    }

    .date-card {
      padding: 14px 16px;
      border-radius: 16px;
      border: 2px solid #333;
      background: linear-gradient(135deg, rgba(26,26,26,.72), rgba(15,15,15,.64));
      cursor: pointer;
      transition: .2s ease;
    }

    .date-card:hover:not(.disabled) {
      border-color: var(--orange);
      transform: translateX(4px);
      background: linear-gradient(135deg, rgba(255,140,66,.14), rgba(255,107,26,.07));
    }

    .date-card.selected {
      background: linear-gradient(135deg, var(--orange), var(--orange-2));
      border-color: var(--orange-2);
      box-shadow: 0 0 18px rgba(255,140,66,.35);
    }

    .date-card.disabled {
      opacity: .42;
      cursor: not-allowed;
    }

    .date-card-title {
      margin-bottom: 8px;
      font-weight: 800;
      font-size: .95rem;
      color: #ffc17f;
    }

    .date-card.selected .date-card-title,
    .date-card.selected .date-card-slots { color: white; }

    .date-card-slots {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .78rem;
    }

    .time-slot-badge {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #66ccff;
      background: rgba(100,200,255,.15);
      color: #7fdcff;
      font-weight: 700;
    }

    .time-slot-badge.booked {
      border-color: #ff5454;
      background: rgba(255,84,84,.15);
      color: #ff8080;
      text-decoration: line-through;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .time-btn {
      padding: 22px 14px;
      border-radius: 14px;
      border: 2px solid #333;
      background: rgba(15,15,15,.68);
      color: var(--text);
      cursor: pointer;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      transition: .22s ease;
    }

    .time-btn:hover:not(:disabled) {
      border-color: var(--red);
      background: rgba(255,26,26,.08);
      transform: translateY(-2px);
    }

    .time-btn.selected {
      background: linear-gradient(135deg, #ff8c42, #ff6b1a);
      border-color: #ff7722;
      box-shadow: 0 10px 28px rgba(255,119,34,.32);
      color: white;
    }

    .time-btn:disabled {
      opacity: .3;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .info-box {
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,140,66,.26);
      background: linear-gradient(135deg, rgba(255,140,66,.10), rgba(236,72,153,.07));
      color: #ddd;
      text-align: center;
      margin-bottom: 22px;
    }

    .full-day-msg {
      margin-bottom: 14px;
      color: #ff8d8d;
      font-weight: 800;
      text-align: center;
    }

    .form-group { margin-bottom: 12px; }

    .form-label {
      display: block;
      margin-bottom: 6px;
      color: white;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #333;
      background: rgba(15,15,15,.68);
      color: var(--text);
      font-size: .95rem;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
      transition: .2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 16px rgba(255,26,26,.14);
    }

    .service-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .service-checkbox { display: none; }

    .service-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      min-height: 70px;
      padding: 15px 12px;
      border-radius: 12px;
      border: 2px solid #333;
      background: rgba(15,15,15,.68);
      color: var(--text);
      cursor: pointer;
      text-align: center;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
      transition: .22s ease;
    }

    .service-label:hover:not(.disabled) {
      border-color: var(--red);
      background: rgba(255,26,26,.08);
    }

    .service-checkbox:checked + .service-label {
      background: #ff1a1a;
      color: white;
      border-color: #ff1a1a;
      box-shadow: 0 8px 24px rgba(255,26,26,.22);
    }

    .service-label.grayed-out {
      opacity: .35;
      cursor: not-allowed;
      background: rgba(15,15,15,.3) !important;
      border-color: #444 !important;
      color: #666 !important;
    }

    .service-label-text { font-weight: 700; line-height: 1.2; }
    .service-label-detail { color: #999; font-size: .85em; }
    .service-label-price {
      color: #ff8c42;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: .84rem;
      font-weight: 800;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      margin-bottom: 10px;
    }

    #step1 .button-group {
      position: sticky;
      bottom: 0;
      margin: 0;
      padding-top: 14px;
      background: linear-gradient(180deg, rgba(10,10,10,0), rgba(10,10,10,.90) 55%, rgba(10,10,10,1) 100%);
    }

    .btn {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: .92rem;
      font-weight: 700;
      letter-spacing: .9px;
      text-transform: uppercase;
      transition: .22s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff2f2f, #ff6b1a);
      color: white;
      box-shadow: 0 8px 20px rgba(255, 47, 47, .22);
    }

    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .btn-secondary {
      background: rgba(0,0,0,.25);
      color: white;
      border: 2px solid #555;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(5px);
    }

    .modal-overlay.active { display: flex; }

    .modal, .line-modal {
      width: 100%;
      max-width: 600px;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.38);
    }

    .modal {
      padding: 24px;
      border: 2px solid var(--orange);
      background: linear-gradient(135deg, rgba(10,10,10,.97), rgba(26,26,26,.97));
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 2px solid rgba(255,140,66,.18);
    }

    .modal-header h2 {
      margin: 0;
      color: var(--orange);
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: 1.05rem;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--orange);
      font-size: 1.6rem;
      cursor: pointer;
    }

    .line-modal {
      max-width: 520px;
      padding: 34px 26px;
      text-align: center;
      border: 2px solid rgba(0, 200, 83, .65);
      background: linear-gradient(135deg, rgba(10,10,10,.98), rgba(22,22,22,.98));
    }

    .line-modal-header {
      margin-bottom: 14px;
      color: #00c853;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: 1.55rem;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .line-info-text {
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,170,102,.35);
      background: linear-gradient(135deg, rgba(255,170,102,.12), rgba(255,170,102,.05));
      color: #ffcc96;
      line-height: 1.85;
      font-weight: 600;
    }

    .line-button-group { display: flex; gap: 12px; flex-direction: column; }
    .line-btn {
      padding: 14px 22px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: .86rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .line-btn-primary {
      background: linear-gradient(135deg, #00b900, #00d46d);
      color: white;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 1400;
      max-width: min(88vw, 420px);
      padding: 14px 18px;
      border-radius: 12px;
      background: #ff8c42;
      color: white;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      font-size: .84rem;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(0,0,0,.28);
      animation: slideIn .24s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(120px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes logoGlow {
      0%, 100% {
        box-shadow: 0 0 18px rgba(255, 180, 80, .22), 0 0 36px rgba(255, 140, 66, .14);
        transform: translateY(0);
      }
      50% {
        box-shadow: 0 0 26px rgba(255, 200, 120, .42), 0 0 54px rgba(255, 140, 66, .24);
        transform: translateY(-1px);
      }
    }

    @keyframes titleFadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes sectionFadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 767px) {
      .header {
        padding: 14px;
        align-items: flex-start;
      }

      .brand-logo { width: 52px; height: 52px; }
      .header-actions { display: none; }
      .content { padding: 18px 14px 28px; }
      .service-philosophy { padding: 24px 18px; }
      .time-grid { grid-template-columns: 1fr; }
      .btn { font-size: .88rem; }
      .line-modal { padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <header class="header">
      <div class="brand">
        <img class="brand-logo" src="/mnt/data/8BEB7091-8485-488F-96BE-87A610B7B283.png" alt="富星車美 Logo" />
        <div>
          <h1>富星車美</h1>
          <div class="brand-subtitle">SHINE BEYOND LIMITS</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="priceBtn">💰 費用</button>
      </div>
    </header>

    <main class="content">
      <div class="container">
        <section class="service-philosophy glass">
          <div class="philosophy-item"><div class="philosophy-icon">⭐</div><div class="philosophy-text">專業技術</div></div>
          <div class="philosophy-item"><div class="philosophy-icon">🎯</div><div class="philosophy-text">完美效果</div></div>
          <div class="philosophy-item"><div class="philosophy-icon">⚡</div><div class="philosophy-text">快速有效</div></div>
          <div class="philosophy-item"><div class="philosophy-icon">🤝</div><div class="philosophy-text">誠心服務</div></div>
        </section>

        <section id="step1" class="step-section active">
          <div class="step-card glass">
            <div class="section-title">選擇日期</div>
            <div class="date-selector-header">
              <h3 id="dateMonthLabel"></h3>
              <div class="date-nav">
                <button id="prevMonth">←</button>
                <button id="nextMonth">→</button>
              </div>
            </div>
            <div class="date-list" id="dateList"></div>
            <div class="button-group"><button class="btn btn-primary" id="nextFromStep1">下一步 →</button></div>
          </div>
        </section>

        <section id="step2" class="step-section">
          <div class="step-card glass">
            <div class="section-title">選擇時段</div>
            <div class="time-grid" id="timeGrid"></div>
            <div id="fullDayMsg" class="full-day-msg"></div>
            <div class="info-box">💡 <strong>重要提醒：</strong>此為預約時段參考，具體的時間與地點會在預約完成後由真人與您做詳細確認。</div>
            <div class="button-group"><button class="btn btn-secondary" id="backFrom2">← 上一步</button> <button class="btn btn-primary" id="nextFromStep2">下一步 →</button></div>
          </div>
        </section>

        <section id="step3" class="step-section">
          <div class="step-card glass">
            <div class="section-title">填寫資料</div>
            <div class="form-group"><label class="form-label">姓名 *</label><input class="form-input" id="name" type="text" placeholder="請輸入姓名" required></div>
            <div class="form-group"><label for="vehicle_type">車型 *</label><input type="text"id="vehicle_type"name="vehicle_type"placeholder="例如：Altis、CX-5、Model 3" required></div>

            <div class="form-group"><label class="form-label">電話 *</label><input class="form-input" id="phone" type="tel" placeholder="請輸入電話" required></div>
            <div class="form-group"><label class="form-label">LINE ID *</label><input class="form-input" id="lineId" type="text" placeholder="請輸入 LINE ID" required></div>

            <div class="section-title" style="margin-top: 30px;">選擇服務</div>
            <div style="background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 140, 66, 0.1)); border: 3px solid #ffaa00; border-radius: 16px; padding: 20px; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(255, 170, 0, 0.2);">
              <div style="color: #ffaa66; font-weight: 800; font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">🎁 優惠套餐 - 一次解決！</div>
              <div class="service-grid" id="packageGrid"></div>
            </div>
            <div class="service-grid" id="serviceGrid"></div>
            <div style="background: linear-gradient(135deg, rgba(255, 140, 66, 0.15), rgba(236, 72, 153, 0.1)); border: 2px solid rgba(255, 140, 66, 0.4); border-radius: 12px; padding: 16px; margin-top: 16px; display: none;" id="bikeAddonsNote">
              <div style="color: #ffaa66; font-weight: 700; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">💡 機車加購項目提醒</div>
              <div style="color: #ccc; font-size: 12px; line-height: 1.6;">機車的加購項目金額會依實際車況在後續洽詢時做詳細確認，歡迎詢問！</div>
            </div>

      { id:'s21', value:'機車精緻洗車 ($400-600)', label:'🛵 精緻洗車 🔥主推', details:'細節刷洗 • 柏油去除 • 快鍍保護' },

    ];

    const mainServiceIds = new Set(['pkg1','pkg2','pkg3','s1','s2','s11','s12','s13','s8','s9','s10','s21','s22','s23','s24']);
    const interiorIds = new Set(['s3','s4']);
    const waxIds = new Set(['s5','s6','s7']);
    const addonIds = new Set(['s14','s15','s16','s17','s18','s19','s20']);
    const packageIds = new Set(['pkg1','pkg2','pkg3']);
    const wheelCoatingIds = new Set(['s19','s20']);
    const glassCoatingIds = new Set(['s17','s18']);
    const coatingMainIds = new Set(['s8','s9','s10']);
    const bikeServiceIds = new Set(['s21','s22','s23','s24']);

    function validateBookingToken() {
      const url = new URL(window.location.href);
      const queryToken = url.searchParams.get('booking_token');
      let hashToken = null;
      if (window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        hashToken = hashParams.get('booking_token');
      }
      return queryToken || hashToken || null;
    }

    async function loadBookingsFromApi() {
      try {
        const res = await fetch('/api/admin-bookings');
        const data = await res.json();
        if (!res.ok) return;
        allBookings = Array.isArray(data.bookings) ? data.bookings : [];
      } catch (error) {
        console.error('loadBookingsFromApi error:', error);
      }
    }

    function setupAllEventListeners() {
      document.addEventListener('click', (e) => {
        if (e.target.closest('.date-card:not(.disabled)')) {
          const card = e.target.closest('.date-card');
          const dateText = card.dataset.date;
          if (!dateText) return;
          selectedDate = dateText;
          selectedTime = null;
          document.querySelectorAll('.date-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          generateTimeGrid();
        }
      });

      document.getElementById('prevMonth').addEventListener('click', () => {
        currentMonth.setMonth(currentMonth.getMonth() - 1);
        generateDateGrid();
      });
      document.getElementById('nextMonth').addEventListener('click', () => {
        currentMonth.setMonth(currentMonth.getMonth() + 1);
        generateDateGrid();
      });
      document.getElementById('nextFromStep1').addEventListener('click', () => {
        if (!selectedDate) return showToast('❌ 請選擇日期');
        goToStep(2);
        generateTimeGrid();
      });
      document.getElementById('nextFromStep2').addEventListener('click', () => {
        if (!selectedTime) return showToast('❌ 請選擇時段');
        goToStep(3);
      });
      document.getElementById('backFrom2').addEventListener('click', () => goToStep(1));
      document.getElementById('backFrom3').addEventListener('click', () => goToStep(2));
      document.getElementById('submitBtn').addEventListener('click', submitBooking);
      document.getElementById('priceBtn').addEventListener('click', () => document.getElementById('priceModal').classList.add('active'));
      document.getElementById('closePriceBtn').addEventListener('click', () => document.getElementById('priceModal').classList.remove('active'));
      document.getElementById('closeLineBtn').addEventListener('click', () => document.getElementById('lineModal').classList.remove('active'));
    }

    function generateDateGrid() {
      const list = document.getElementById('dateList');
      list.innerHTML = '';
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      document.getElementById('dateMonthLabel').textContent = `${year} 年 ${month + 1} 月`;
      const today = new Date();
      today.setHours(0,0,0,0);
      const lastDay = new Date(year, month + 1, 0);
      const futureCards = [];
      const pastCards = [];

      for (let dateNum = 1; dateNum <= lastDay.getDate(); dateNum++) {
        const date = new Date(year, month, dateNum);
        date.setHours(0,0,0,0);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const dateStr = `${y}-${m}-${d}`;
        const dayNames = ['日','一','二','三','四','五','六'];
        const dayName = dayNames[date.getDay()];
        const isToday = date.getTime() === today.getTime();
        const isPast = date < today;
        const bookingsForDate = allBookings.filter(b => b.booking_date === dateStr);
        const morningBooked = bookingsForDate.some(b => b.booking_time === '10:00');
        const afternoonBooked = bookingsForDate.some(b => b.booking_time === '14:00');
        const eveningBooked = bookingsForDate.some(b => b.booking_time === '18:00');
        const isFullyBooked = morningBooked && afternoonBooked && eveningBooked;

        const card = document.createElement('div');
        card.className = 'date-card';
        card.dataset.date = dateStr;
        if (selectedDate === dateStr) card.classList.add('selected');
        if (isPast || isFullyBooked) card.classList.add('disabled');

        card.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
            <div style="flex:1;">
              <div class="date-card-title ${isToday ? 'today' : ''}">${isToday ? '今天' : `${month + 1}/${dateNum}`} (${dayName})</div>
              <div class="date-card-slots">
                <span class="time-slot-badge ${morningBooked ? 'booked' : ''}">🌅 上午</span>
                <span class="time-slot-badge ${afternoonBooked ? 'booked' : ''}">☀️ 下午</span>
                <span class="time-slot-badge ${eveningBooked ? 'booked' : ''}">🌆 傍晚</span>
              </div>
            </div>
            ${isFullyBooked ? `<div style="background:#ff1a1a;color:white;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;">預約額滿</div>` : ''}
          </div>`;

        if (isPast) pastCards.push(card); else futureCards.push(card);
      }
      futureCards.forEach(card => list.appendChild(card));
      pastCards.forEach(card => list.appendChild(card));
    }

    function generateTimeGrid() {
      const grid = document.getElementById('timeGrid');
      const fullDayMsg = document.getElementById('fullDayMsg');
      grid.innerHTML = '';
      fullDayMsg.textContent = '';
      const bookingsForDate = selectedDate ? allBookings.filter(b => b.booking_date === selectedDate) : [];
      const allBooked = ['10:00','14:00','18:00'].every(time => bookingsForDate.some(b => b.booking_time === time));
      if (selectedDate && allBooked) fullDayMsg.textContent = '本日已額滿';

      timeSlots.forEach(slot => {
        const isBooked = selectedDate && bookingsForDate.some(b => b.booking_time === slot.time);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'time-btn';
        btn.textContent = slot.label;
        btn.disabled = !!isBooked;
        if (selectedTime === slot.time) btn.classList.add('selected');
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          selectedTime = slot.time;
          document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
        grid.appendChild(btn);
      });
    }

    function generateServiceGrid() {
      const grid = document.getElementById('serviceGrid');
      const packageGrid = document.getElementById('packageGrid');
      grid.innerHTML = '';
      packageGrid.innerHTML = '';
      const categoryStyle = `style="grid-column: 1 / -1; padding: 12px 0 8px; border-bottom: 2px solid rgba(255, 140, 66, 0.3); margin: 16px 0 12px; color: #ffaa66; font-weight: 800; font-size: 13px; letter-spacing: 0.5px;"`;

      const createServiceHTML = (s) => {
        const priceMatch = s.value.match(/\(([^)]+)\)$/);
        let price = priceMatch ? priceMatch[1] : '';
        let displayPrice = price;
        if (s.id === 's4') {
          const isSpecialMain = selectedMainService === 's2' || selectedMainService === 's12' || selectedMainService === 's13';
          if (isSpecialMain) displayPrice = '加購 $800-2,000';
        }
        return `<div><input type="checkbox" id="${s.id}" class="service-checkbox" value="${s.value}" data-service-id="${s.id}"><label for="${s.id}" class="service-label" data-service-id="${s.id}"><span class="service-label-text">${s.label}</span>${s.details ? `<span class="service-label-detail">${s.details}</span>` : ''}<span class="service-label-price">${displayPrice || price}</span></label></div>`;
      };

      packageGrid.innerHTML = packages.map(createServiceHTML).join('');
      grid.innerHTML =
        `<div ${categoryStyle}>🚗 汽車洗車服務</div>` + services.filter(s => s.id.match(/^s[12]$/)).map(createServiceHTML).join('') +
        `<div ${categoryStyle}>🛵 機車服務 <span style="color:#ffaa66;font-size:11px;font-weight:600;margin-left:12px;background:rgba(255,170,0,.2);padding:4px 8px;border-radius:4px;">💡 加購項目金額會在後續洽詢做確認</span></div>` + services.filter(s => s.id.match(/^s2[1234]$/)).map(createServiceHTML).join('') +
        `<div ${categoryStyle}>🧽 內裝清潔服務</div>` + services.filter(s => s.id.match(/^s[34]$/)).map(createServiceHTML).join('') +
        `<div ${categoryStyle}>✨ 車漆保護蠟</div>` + services.filter(s => s.id.match(/^s[567]$/)).map(createServiceHTML).join('') +
        `<div ${categoryStyle}>💎 車體鍍膜方案</div>` + services.filter(s => s.id.match(/^s[89]$/) || s.id === 's10').map(createServiceHTML).join('') +
        `<div ${categoryStyle}>✨ 小美容＆大美容</div>` + services.filter(s => s.id.match(/^s1[123]$/)).map(createServiceHTML).join('') +
        `<div ${categoryStyle}>🛠 加購服務</div>` + services.filter(s => ['s14','s15','s16','s17','s18','s19','s20'].includes(s.id)).map(createServiceHTML).join('');

      setupServiceSelectionLogic();
    }

    function setupServiceSelectionLogic() {
      const checkboxes = document.querySelectorAll('.service-checkbox');
      checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', () => {
          const serviceId = checkbox.dataset.serviceId;
          if (checkbox.checked) {
            if (mainServiceIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && mainServiceIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              selectedMainService = serviceId;
              updateServiceAvailability(serviceId);
            } else if (interiorIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && interiorIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (waxIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && waxIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (wheelCoatingIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && wheelCoatingIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (glassCoatingIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && glassCoatingIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (bikeServiceIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && bikeServiceIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else {
              updateServiceAvailability(selectedMainService);
            }
          } else {
            if (mainServiceIds.has(serviceId) && selectedMainService === serviceId) {
              selectedMainService = null;
              updateServiceAvailability(null);
            } else {
              updateServiceAvailability(selectedMainService);
            }
          }
          applyServiceStyling();
          updatePriceDisplay();
        });
      });
    }

    function updateServiceAvailability(mainServiceId) {
      const checkboxes = document.querySelectorAll('.service-checkbox');
      let allowInterior = false;
      let allowWax = false;
      let allowAddons = false;
      let disabledGlassCoating = false;
      let disabledWheelCoating = false;
      let disableAllAddons = false;
      let waxRestriction = null;

      if (mainServiceId === null) {
        allowInterior = true; allowWax = true; allowAddons = true;
      } else if (packageIds.has(mainServiceId)) {
        allowInterior = false; allowWax = false; allowAddons = true;
      } else if (coatingMainIds.has(mainServiceId)) {
        allowInterior = true; allowWax = false; allowAddons = 'limited'; disabledGlassCoating = true; disabledWheelCoating = true;
      } else if (mainServiceId === 's1') {
        allowInterior = true; allowWax = true; allowAddons = true;
      } else if (mainServiceId === 's2') {
        allowInterior = 's4'; allowWax = true; allowAddons = true; waxRestriction = 'exclude_s6';
      } else if (mainServiceId === 's11') {
        allowInterior = true; allowWax = false; allowAddons = true;
      } else if (mainServiceId === 's12' || mainServiceId === 's13') {
        allowInterior = 's4'; allowWax = false; allowAddons = true;
      } else if (mainServiceId === 's23') {
        allowInterior = false; allowWax = true; allowAddons = false; disableAllAddons = true; disabledGlassCoating = true; disabledWheelCoating = true; waxRestriction = 'all';
      } else if (mainServiceId === 's21') {
        allowInterior = false; allowWax = true; allowAddons = false; disableAllAddons = true; disabledGlassCoating = true; disabledWheelCoating = true; waxRestriction = 'exclude_s6';
      } else if (mainServiceId === 's22' || mainServiceId === 's24') {
        allowInterior = false; allowWax = false; allowAddons = false; disableAllAddons = true; disabledGlassCoating = true; disabledWheelCoating = true; waxRestriction = 'none';
      }

      checkboxes.forEach(checkbox => {
        const serviceId = checkbox.dataset.serviceId;
        if (mainServiceIds.has(serviceId)) {
          checkbox.disabled = mainServiceId !== null && mainServiceId !== serviceId;
        } else if (interiorIds.has(serviceId)) {
          if (allowInterior === true) checkbox.disabled = false;
          else if (allowInterior === 's4') checkbox.disabled = serviceId !== 's4';
          else checkbox.disabled = true;
        } else if (waxIds.has(serviceId)) {
          if (!allowWax || allowWax === false) checkbox.disabled = true;
          else if (waxRestriction === 'none') checkbox.disabled = true;
          else if (waxRestriction === 'exclude_s6') checkbox.disabled = (serviceId === 's6');
          else checkbox.disabled = false;
        } else if (glassCoatingIds.has(serviceId)) {
          checkbox.disabled = disabledGlassCoating;
        } else if (wheelCoatingIds.has(serviceId)) {
          checkbox.disabled = disabledWheelCoating;
        } else if (addonIds.has(serviceId)) {
          if (disableAllAddons) checkbox.disabled = true;
          else if (allowAddons === true) checkbox.disabled = false;
          else if (allowAddons === 'limited') checkbox.disabled = !['s14','s15','s16'].includes(serviceId);
          else checkbox.disabled = true;
        }
      });
    }

    function applyServiceStyling() {
      document.querySelectorAll('.service-label').forEach(label => {
        const checkbox = document.getElementById(label.dataset.serviceId);
        if (checkbox.disabled) label.classList.add('grayed-out');
        else label.classList.remove('grayed-out');
      });
    }

    function goToStep(step) {
      currentStep = step;
      document.querySelectorAll('.step-section').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${step}`).classList.add('active');
      document.querySelector('.service-philosophy').style.display = step === 1 ? 'grid' : 'none';
    }

    async function submitBooking() {
      if (!bookingToken) return showToast('❌ 預約連結無效，請從 LINE 重新進入');
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const lineId = document.getElementById('lineId').value.trim();
      const selectedServices = Array.from(document.querySelectorAll('.service-checkbox:checked')).map(cb => cb.value);

      if (!name || !phone || !vehicleType) {alert('請完整填寫姓名、電話、車型');return;}
      if (!selectedDate) return showToast('❌ 請選擇日期');
      if (!selectedTime) return showToast('❌ 請選擇時段');
      if (!selectedServices.length) return showToast('❌ 請選擇服務');

      const bookingData = {
        booking_token: bookingToken,
        customer_name: name,
        customer_phone: phone,
        vehicle_type: vehicleType,
        customer_line: lineId,
        booking_date: selectedDate,
        booking_time: selectedTime,
        service_name: selectedServices.join('、'),
        service_items: selectedServices.join('、'),
        created_at: new Date().toISOString()
      };

      try {
        const response = await fetch('/api/create-booking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bookingData)
        });
        const result = await response.json();
        if (!response.ok) return showToast(`❌ ${result.message || '預約失敗'}`);
        showToast('✅ 預約已送出');
        document.getElementById('lineModal').classList.add('active');
        await loadBookingsFromApi();
        resetForm();
        generateDateGrid();
        generateTimeGrid();
        goToStep(1);
      } catch (error) {
        console.error('submitBooking error:', error);
        showToast('❌ 預約送出失敗，請稍後再試');
      }
    }

    function resetForm() {
      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('lineId').value = '';
      document.querySelectorAll('.service-checkbox').forEach(cb => cb.checked = false);
      selectedDate = null;
      selectedTime = null;
      selectedMainService = null;
      updatePriceDisplay();
    }

    function loadPrices() {
      document.getElementById('priceContent').innerHTML = '<div style="color:#ccc;line-height:1.9;font-size:14px;">費用說明可沿用正式版本內容，這裡先保留預覽結構。</div>';
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function updatePriceDisplay() {
      const selectedServices = Array.from(document.querySelectorAll('.service-checkbox:checked')).map(cb => cb.dataset.serviceId);
      const priceDisplay = document.getElementById('priceDisplay');
      const bikeAddonsNote = document.getElementById('bikeAddonsNote');
      if (!selectedServices.length) {
        priceDisplay.style.display = 'none';
        bikeAddonsNote.style.display = 'none';
        return;
      }
      let minPrice = 0;
      let maxPrice = 0;
      selectedServices.forEach(serviceId => {
        if (servicePrices[serviceId]) {
          minPrice += servicePrices[serviceId][0];
          maxPrice += servicePrices[serviceId][1];
        }
      });
      document.getElementById('priceRange').textContent = `$${minPrice.toLocaleString()} ~ $${maxPrice.toLocaleString()}`;
      document.getElementById('priceNote').textContent = '⚠️ 依車況、車型評估，實際價格會有變動';
      document.getElementById('priceEstimateWarning').textContent = '💡 此為預估金額，實際費用依車況評估';
      priceDisplay.style.display = 'block';
    }

    async function initPage() {
      bookingToken = validateBookingToken();
      await loadBookingsFromApi();
      generateDateGrid();
      generateTimeGrid();
      generateServiceGrid();
      loadPrices();
      setupAllEventListeners();
      if (!bookingToken) showToast('⚠️ 預約連結無效，請從 LINE 的預約連結重新進入');
    }

    initPage();
  </script>
</body>
</html>
