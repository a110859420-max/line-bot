<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>預約系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background:#0d0d0d; color:#fff; font-family:sans-serif; text-align:center; padding:40px;}
button { background:#ff6a00; color:#fff; border:none; padding:15px 25px; font-size:16px; border-radius:8px;}
</style>
</head>

<body>

<h1>預約系統</h1>
<p id="status">讀取中...</p>
<button onclick="submitBooking()">送出預約</button>

<script>
function getBookingToken() {
  const url = new URL(window.location.href);

  const queryToken = url.searchParams.get('booking_token');

  let hashToken = null;
  if (window.location.hash) {
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    hashToken = hashParams.get('booking_token');
  }

  const token = queryToken || hashToken;

  console.log('URL:', window.location.href);
  console.log('query token:', queryToken);
  console.log('hash token:', hashToken);
  console.log('final token:', token);

  return token || null;
}

const bookingToken = getBookingToken();

if (!bookingToken) {
  document.getElementById("status").innerText = "⚠️ 未帶入 token（測試模式）";
} else {
  document.getElementById("status").innerText = "✅ Token 正常";
}

async function submitBooking() {
  try {
    const res = await fetch('/api/create-booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        booking_token: bookingToken || 'test_token',
        customer_name: '測試用戶',
        customer_phone: '0900000000'
      })
    });

    const data = await res.json();
    alert(data.message);

  } catch (err) {
    alert('送出失敗');
    console.error(err);
  }
}
</script>

</body>
</html>
