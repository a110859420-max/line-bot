<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LINE 預約</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #000, #ff7a00);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #ff7a00;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>LINE 預約系統</h2>

    <p id="status">讀取中...</p>

    <input id="name" placeholder="姓名">
    <input id="phone" placeholder="電話">

    <button onclick="sendBooking()">送出預約</button>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get("booking_token");

    const statusEl = document.getElementById("status");

    if (!token) {
      statusEl.innerText = "❌ 預約連結無效";
    } else {
      statusEl.innerText = "✅ 已取得 token";
    }

    async function sendBooking() {
      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;

      const res = await fetch("/api/create-booking", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          booking_token: token,
          customer_name: name,
          customer_phone: phone
        })
      });

      const data = await res.json();

      alert(data.message || "完成");
    }
  </script>
</body>
</html>
