<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="富星車美線上預約系統">
  <meta property="og:description" content="代客洗車 行動洗車 - 專業車美服務線上預約">
  <meta property="og:type" content="website">
  <title>富星車美線上預約系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #e0e7ff;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    }

    .app-wrapper {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.8), rgba(26, 26, 26, 0.8));
      padding: 20px;
      border-bottom: 2px solid rgba(255, 140, 66, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    .header h1 {
      font-size: 22px;
      background: linear-gradient(90deg, #ffaa66 0%, #ff6b1a 20%, #ff8c42 40%, #ffaa66 60%, #ff6b1a 80%, #ff8c42 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 0.5px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
      animation: colorFlow 3s ease-in-out infinite;
    }

    @keyframes colorFlow {
      0% { background-position: 200% center; }
      50% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .header-subtitle {
      font-size: 12px;
      background: linear-gradient(90deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 500;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      animation: colorFlow 3s ease-in-out infinite;
    }

    @media (max-width: 767px) {
      .header-subtitle {
        max-width: 110px;
        overflow: hidden;
        text-overflow: clip;
        white-space: nowrap;
      }
    }

    @media (min-width: 768px) {
      .header h1 {
        font-size: 40px;
        letter-spacing: 2px;
        gap: 8px;
        flex-direction: row;
        align-items: center;
      }

      .header-subtitle {
        font-size: 18px;
        white-space: normal;
      }
    }

    .header-buttons {
      display: flex;
      gap: 10px;
    }

    .header-btn {
      background: rgba(245, 245, 240, 0.1);
      border: 2px solid #f5f5f0;
      color: #f5f5f0;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.3s ease;
      white-space: nowrap;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }

    @media (min-width: 768px) {
      .header-btn {
        padding: 10px 18px;
        font-size: 15px;
      }
    }

    .header-btn:hover {
      background: #f5f5f0;
      color: #0a0a0a;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 30px 20px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .service-philosophy {
      background: linear-gradient(135deg, rgba(255, 140, 66, 0.15) 0%, rgba(236, 72, 153, 0.08) 100%);
      border: 2px solid rgba(255, 140, 66, 0.4);
      border-radius: 16px;
      padding: 40px 32px;
      margin-bottom: 50px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 36px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 12px 40px rgba(255, 140, 66, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    
    @media (min-width: 768px) {
      .service-philosophy {
        grid-template-columns: repeat(4, 1fr);
        gap: 28px;
        max-width: 100%;
        padding: 48px 40px;
      }
    }

    .philosophy-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .philosophy-icon {
      font-size: 32px;
      line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(255, 140, 66, 0.15));
      animation: bobbing 3s ease-in-out infinite;
    }

    @keyframes bobbing {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    .philosophy-text {
      font-size: 12px;
      font-weight: 800;
      background: linear-gradient(135deg, #ffaa66 0%, #ff8c42 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
    }

    .philosophy-desc {
      display: none;
    }

    @media (max-width: 767px) {
      .service-philosophy {
        gap: 28px;
        padding: 32px 24px;
      }

      .philosophy-icon {
        font-size: 56px;
      }

      .philosophy-text {
        font-size: 13px;
      }
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #ffffff 0%, #ffaa66 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 0.5px;
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
    }
    
    @media (min-width: 768px) {
      .section-title {
        font-size: 22px;
      }
    }

    .section-title::before {
      content: '';
      width: 3px;
      height: 26px;
      background: #ff1a1a;
      border-radius: 2px;
    }

    .step-section {
      display: none;
    }

    .step-section.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .date-selector-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 10px;
    }

    .date-selector-header h3 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffaa66 0%, #ff8c42 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
      font-family: 'Playfair Display', 'Noto Sans TC', serif;
    }

    .date-nav {
      display: flex;
      gap: 10px;
    }

    .date-nav button {
      background: rgba(255, 140, 66, 0.2);
      border: 2px solid #ff8c42;
      color: #ff8c42;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .date-nav button:hover {
      background: #ff8c42;
      color: white;
    }

    .date-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }

    .date-card {
      background: linear-gradient(135deg, rgba(26, 26, 26, 0.6), rgba(15, 15, 15, 0.5));
      border: 2px solid #333;
      border-radius: 12px;
      padding: 12px 14px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .date-card:hover:not(.disabled) {
      border-color: #ff8c42;
      background: linear-gradient(135deg, rgba(255, 140, 66, 0.1), rgba(255, 107, 26, 0.05));
      transform: translateX(4px);
    }

    .date-card.selected {
      background: linear-gradient(135deg, #ff8c42, #ff6b1a);
      border-color: #ff6b1a;
      box-shadow: 0 0 16px rgba(255, 140, 66, 0.6);
    }

    .date-card.selected .date-card-title,
    .date-card.selected .date-card-slots {
      color: white;
    }

    .date-card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .date-card.disabled:hover {
      border-color: #333;
      background: linear-gradient(135deg, rgba(26, 26, 26, 0.6), rgba(15, 15, 15, 0.5));
      transform: none;
    }

    .date-card-title {
      font-size: 14px;
      font-weight: 700;
      color: #ffaa66;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
    }

    .date-card-title.today::before {
      content: '📍';
    }

    .date-card-slots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      color: #ccc;
      font-size: 12px;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
    }

    .time-slot-badge {
      background: rgba(100, 200, 255, 0.2);
      border: 1px solid #66ccff;
      color: #66ccff;
      padding: 3px 6px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }

    .time-slot-badge.booked {
      background: rgba(255, 68, 68, 0.2);
      border-color: #ff4444;
      color: #ff4444;
      text-decoration: line-through;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .time-btn {
      padding: 28px 16px;
      border: 2px solid #333;
      background: rgba(15, 15, 15, 0.6);
      color: #e0e7ff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 700;
      transition: all 0.3s ease;
      text-align: center;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }
    
    @media (min-width: 768px) {
      .time-btn {
        font-size: 18px;
      }
    }

    .time-btn:hover:not(:disabled) {
      border-color: #ff1a1a;
      background: rgba(255, 26, 26, 0.1);
      transform: translateY(-2px);
    }

    .time-btn.selected {
      background: #ff7722;
      color: white;
      border-color: #ff7722;
      box-shadow: 0 8px 24px rgba(255, 119, 34, 0.4);
    }

    .time-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .full-day-msg {
      margin-top: 10px;
      color: #ff7d7d;
      font-weight: 700;
      text-align: center;
      font-family: 'Noto Sans TC', sans-serif;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #333;
      background: rgba(15, 15, 15, 0.6);
      color: #e0e7ff;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    
    @media (min-width: 768px) {
      .form-input {
        font-size: 13px;
      }
    }

    .form-input:focus {
      outline: none;
      border-color: #ff1a1a;
      background: rgba(255, 26, 26, 0.05);
      box-shadow: 0 0 16px rgba(255, 26, 26, 0.15);
    }

    .service-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .service-checkbox {
      display: none;
    }

    .service-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 12px;
      border: 2px solid #333;
      background: rgba(15, 15, 15, 0.6);
      color: #e0e7ff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      transition: all 0.3s ease;
      width: 100%;
      gap: 6px;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
      min-height: 68px;
      overflow: hidden;
    }
    
    @media (min-width: 768px) {
      .service-label {
        font-size: 13px;
        padding: 14px 12px;
        gap: 6px;
        min-height: 60px;
      }
    }

    .service-label-text {
      flex: 1;
      line-height: 1.15;
      word-break: break-word;
      font-size: 0.95em;
      max-height: 2.4em;
      overflow: hidden;
    }

    .service-label-detail {
      color: #999;
      font-size: 0.9em;
      font-weight: 400;
      line-height: 1.2;
      max-height: 1.2em;
      overflow: hidden;
    }

    .service-label-price {
      color: #ff8c42;
      font-weight: 700;
      white-space: nowrap;
      font-size: 13px;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }

    .price-estimate {
      color: #888;
      font-size: 9px;
      margin-top: 2px;
      line-height: 1.2;
      font-weight: 500;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
    }

    .service-label:hover:not(.disabled) {
      border-color: #ff1a1a;
      background: rgba(255, 26, 26, 0.1);
    }

    .service-checkbox:checked + .service-label {
      background: #ff1a1a;
      color: white;
      border-color: #ff1a1a;
      box-shadow: 0 8px 24px rgba(255, 26, 26, 0.3);
    }

    .service-checkbox:checked + .service-label .service-label-price {
      color: white;
    }

    .service-checkbox:checked + .service-label .service-label-detail {
      color: #ddd;
    }

    .service-label.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .service-label.grayed-out {
      opacity: 0.35;
      cursor: not-allowed;
      background: rgba(15, 15, 15, 0.3) !important;
      border-color: #444 !important;
      color: #666 !important;
    }

    .service-label.grayed-out .service-label-price {
      color: #555 !important;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      margin-bottom: 30px;
    }

    #step1 .button-group {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0;
      padding: 16px 20px;
      background: linear-gradient(180deg, rgba(10, 10, 10, 0) 0%, rgba(10, 10, 10, 0.95) 60%, rgba(10, 10, 10, 1) 100%);
      max-width: 100%;
      z-index: 100;
    }

    #step1 .date-list {
      margin-bottom: 90px;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex: 1;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }
    
    @media (min-width: 768px) {
      .btn {
        font-size: 14px;
      }
    }

    .btn-primary {
      background: #ff1a1a;
      color: white;
      box-shadow: 0 4px 16px rgba(255, 26, 26, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 8px 24px rgba(255, 26, 26, 0.4);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(0, 0, 0, 0.3);
      color: #ffffff;
      border: 2px solid #555;
    }

    .btn-secondary:hover {
      background: rgba(255, 26, 26, 0.1);
      border-color: #ff1a1a;
      color: #ff1a1a;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(26, 26, 26, 0.95) 100%);
      border: 2px solid #ff8c42;
      border-radius: 12px;
      padding: 20px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(255, 140, 66, 0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid rgba(255, 140, 66, 0.2);
    }

    .modal-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: #ff8c42;
      letter-spacing: 0.5px;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }

    .modal-close {
      background: none;
      border: none;
      color: #ff8c42;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      transform: rotate(90deg);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff8c42;
      color: white;
      padding: 16px 24px;
      border-radius: 10px;
      font-weight: 700;
      z-index: 2000;
      animation: slideIn 0.3s ease;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
      letter-spacing: 0.3px;
      max-width: min(88vw, 420px);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .info-box {
      text-align: center;
      padding: 30px;
      background: linear-gradient(135deg, rgba(255, 140, 66, 0.15), rgba(236, 72, 153, 0.1));
      border: 2px solid rgba(255, 140, 66, 0.3);
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .info-box h3 {
      color: #ffaa66;
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .line-modal {
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.98) 0%, rgba(26, 26, 26, 0.98) 100%);
      border: 3px solid #00b900;
      border-radius: 16px;
      padding: 40px 30px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 185, 0, 0.3);
    }

    .line-modal-header {
      color: #00b900;
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: 1.5px;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }

    .line-info-text {
      background: linear-gradient(135deg, rgba(255, 170, 102, 0.12), rgba(255, 170, 102, 0.05));
      border: 2px solid rgba(255, 170, 102, 0.35);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 26px;
      color: #ffaa66;
      font-size: 14px;
      line-height: 1.9;
      text-align: center;
      font-weight: 600;
      font-family: 'Noto Sans TC', 'Poppins', sans-serif;
      letter-spacing: 0.3px;
    }

    .line-button-group {
      display: flex;
      gap: 12px;
      flex-direction: column;
    }

    .line-btn {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    }

    .line-btn-primary {
      background: linear-gradient(135deg, #00b900 0%, #00d400 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(0, 185, 0, 0.3);
    }

    .line-btn-primary:hover {
      box-shadow: 0 8px 24px rgba(0, 185, 0, 0.5);
      transform: translateY(-2px);
    }

    @media (max-width: 767px) {
      .header {
        padding: 16px 14px;
        gap: 10px;
        align-items: flex-start;
      }

      .header h1 {
        font-size: 24px;
        line-height: 1.2;
      }

      .content {
        padding: 18px 14px 28px;
      }

      .container {
        max-width: 100%;
      }

      .time-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .service-grid {
        gap: 10px;
      }

      .service-label {
        min-height: 72px;
        padding: 14px 12px;
      }

      .button-group {
        gap: 10px;
      }

      .btn {
        padding: 14px 16px;
        font-size: 15px;
      }

      .modal,
      .line-modal {
        width: 100%;
        max-width: 100%;
        padding: 22px 18px;

    function validateBookingToken() {
      const url = new URL(window.location.href);
      const queryToken = url.searchParams.get('booking_token');
      let hashToken = null;
      if (window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        hashToken = hashParams.get('booking_token');
      }
      return queryToken || hashToken || null;

      } catch (error) {
        console.error('loadBookingsFromApi error:', error);

          const card = e.target.closest('.date-card');
          const dateText = card.dataset.date;
          if (dateText) {
            selectedDate = dateText;
            selectedTime = null;
            document.querySelectorAll('.date-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            generateTimeGrid();
          }
        }
      });

          currentMonth.setMonth(currentMonth.getMonth() - 1);
          generateDateGrid();
        }
        if (e.target.id === 'nextMonth') {
          currentMonth.setMonth(currentMonth.getMonth() + 1);
          generateDateGrid();
        }
      });

          goToStep(2);

          goToStep(3);

        }

          goToStep(2);
        }
        if (e.target.id === 'submitBtn') {
          submitBooking();
        }
      });

        }
      });

      document.getElementById('closeLineBtn').addEventListener('click', () => {
        document.getElementById('lineModal').classList.remove('active');
      });
    }

    function generateDateGrid() {
      const list = document.getElementById('dateList');
      list.innerHTML = '';
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      document.getElementById('dateMonthLabel').textContent = `${year} 年 ${month + 1} 月`;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const lastDay = new Date(year, month + 1, 0);
      const futureCards = [];
      const pastCards = [];

      for (let dateNum = 1; dateNum <= lastDay.getDate(); dateNum++) {
        const date = new Date(year, month, dateNum);
        date.setHours(0, 0, 0, 0);
        const dateStr = date.toISOString().split('T')[0];
        const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
        const dayName = dayNames[date.getDay()];
        const isToday = date.getTime() === today.getTime();
        const isPast = date < today;

        const bookingsForDate = allBookings.filter(b => b.booking_date === dateStr);
        const morningBooked = bookingsForDate.some(b => b.booking_time === '10:00');
        const afternoonBooked = bookingsForDate.some(b => b.booking_time === '14:00');
        const eveningBooked = bookingsForDate.some(b => b.booking_time === '18:00');
        const isFullyBooked = morningBooked && afternoonBooked && eveningBooked;

        const card = document.createElement('div');
        card.className = 'date-card';
        card.dataset.date = dateStr;
        if (isFullyBooked || isPast) card.classList.add('disabled');
        if (selectedDate === dateStr) card.classList.add('selected');

        card.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;">
            <div style="flex: 1;">
              <div class="date-card-title ${isToday ? 'today' : ''}">
                ${isToday ? '今天' : `${month + 1}/${dateNum}`} (${dayName})
              </div>
              <div class="date-card-slots">
                <span class="time-slot-badge ${morningBooked ? 'booked' : ''}">🌅 上午</span>
                <span class="time-slot-badge ${afternoonBooked ? 'booked' : ''}">☀️ 下午</span>
                <span class="time-slot-badge ${eveningBooked ? 'booked' : ''}">🌆 傍晚</span>
              </div>
            </div>
            ${isFullyBooked ? `<div style="background: #ff1a1a; color: white; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0;">預約額滿</div>` : ''}
          </div>
        `;

        if (isPast) pastCards.push(card); else futureCards.push(card);
      }

      futureCards.forEach(card => list.appendChild(card));
      pastCards.forEach(card => list.appendChild(card));
    }

    function generateTimeGrid() {
      const grid = document.getElementById('timeGrid');
      const fullDayMsg = document.getElementById('fullDayMsg');
      grid.innerHTML = '';
      fullDayMsg.textContent = '';

      const bookingsForDate = selectedDate ? allBookings.filter(b => b.booking_date === selectedDate) : [];
      const allBooked = ['10:00', '14:00', '18:00'].every(time => bookingsForDate.some(b => b.booking_time === time));
      if (selectedDate && allBooked) fullDayMsg.textContent = '本日已額滿';

      timeSlots.forEach(slot => {
        const isBooked = selectedDate && bookingsForDate.some(b => b.booking_time === slot.time);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'time-btn';
        btn.disabled = isBooked;
        btn.textContent = slot.label;
        if (selectedTime === slot.time) btn.classList.add('selected');
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          selectedTime = slot.time;
          document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
        grid.appendChild(btn);
      });
    }

      const interiorServices = services.filter(s => s.id.match(/^s[34]$/));
      const interiorSection = `<div ${categoryStyle}>🧽 內裝清潔服務</div>${interiorServices.map(createServiceHTML).join('')}`;
      const waxServices = services.filter(s => s.id.match(/^s[567]$/));
      const waxSection = `<div ${categoryStyle}>✨ 車漆保護蠟</div>${waxServices.map(createServiceHTML).join('')}`;
      const coatingServices = services.filter(s => s.id.match(/^s[89]$/) || s.id === 's10');
      const coatingSection = `<div ${categoryStyle}>💎 車體鍍膜方案</div>${coatingServices.map(createServiceHTML).join('')}`;
      const beautyServices = services.filter(s => s.id.match(/^s1[123]$/));
      const beautySection = `<div ${categoryStyle}>✨ 小美容＆大美容</div>${beautyServices.map(createServiceHTML).join('')}`;
      const addonServices = services.filter(s => ['s14','s15','s16','s17','s18','s19','s20'].includes(s.id));
      const addonSection = `<div ${categoryStyle}>🛠 加購服務</div>${addonServices.map(createServiceHTML).join('')}`;
      grid.innerHTML = carWashSection + bikeSection + interiorSection + waxSection + coatingSection + beautySection + addonSection;
      packageGrid.innerHTML = packagesSection;

      setupServiceSelectionLogic();
    }

    function setupServiceSelectionLogic() {
      const checkboxes = document.querySelectorAll('.service-checkbox');
      checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', () => {
          const serviceId = checkbox.dataset.serviceId;
          if (checkbox.checked) {
            if (mainServiceIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && mainServiceIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              selectedMainService = serviceId;
              updateServiceAvailability(serviceId);
            } else if (interiorIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && interiorIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (waxIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && waxIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (wheelCoatingIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && wheelCoatingIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (glassCoatingIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && glassCoatingIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else if (bikeServiceIds.has(serviceId)) {
              checkboxes.forEach(cb => {
                if (cb.dataset.serviceId !== serviceId && bikeServiceIds.has(cb.dataset.serviceId)) cb.checked = false;
              });
              updateServiceAvailability(selectedMainService);
            } else {
              updateServiceAvailability(selectedMainService);
            }
          } else {
            if (mainServiceIds.has(serviceId) && selectedMainService === serviceId) {
              selectedMainService = null;
              updateServiceAvailability(null);
            } else {
              updateServiceAvailability(selectedMainService);
            }
          }
          applyServiceStyling();
          updatePriceDisplay();
        });
      });
    }

    function updateServiceAvailability(mainServiceId) {
      const checkboxes = document.querySelectorAll('.service-checkbox');
      let allowInterior = false;
      let allowWax = false;
      let allowAddons = false;
      let disabledGlassCoating = false;
      let disabledWheelCoating = false;
      let disabledSealant = false;
      let disableAllAddons = false;
      let waxRestriction = null;

      if (mainServiceId === null) {
        allowInterior = true; allowWax = true; allowAddons = true;
      } else if (packageIds.has(mainServiceId)) {
        allowInterior = false; allowWax = false; allowAddons = true; disabledSealant = true;
      } else if (coatingMainIds.has(mainServiceId)) {
        allowInterior = true; allowWax = false; allowAddons = 'limited'; disabledGlassCoating = true; disabledWheelCoating = true; disabledSealant = true;
      } else if (mainServiceId === 's1') {
        allowInterior = true; allowWax = true; allowAddons = true;
      } else if (mainServiceId === 's2') {
        allowInterior = 's4'; allowWax = true; allowAddons = true; disabledSealant = true; waxRestriction = 'exclude_s6';
      } else if (mainServiceId === 's11') {
        allowInterior = true; allowWax = false; allowAddons = true; disabledSealant = true;
      } else if (mainServiceId === 's12' || mainServiceId === 's13') {
        allowInterior = 's4'; allowWax = false; allowAddons = true; disabledSealant = true;
      } else if (mainServiceId === 's23') {
        allowInterior = false; allowWax = true; allowAddons = false; disableAllAddons = true; disabledGlassCoating = true; disabledWheelCoating = true; waxRestriction = 'all';
      } else if (mainServiceId === 's21') {
        allowInterior = false; allowWax = true; allowAddons = false; disableAllAddons = true; disabledGlassCoating = true; disabledWheelCoating = true; waxRestriction = 'exclude_s6';
      } else if (mainServiceId === 's22' || mainServiceId === 's24') {
        allowInterior = false; allowWax = false; allowAddons = false; disableAllAddons = true; disabledGlassCoating = true; disabledWheelCoating = true; waxRestriction = 'none';
      }

      checkboxes.forEach(checkbox => {
        const serviceId = checkbox.dataset.serviceId;
        if (mainServiceIds.has(serviceId)) {
          checkbox.disabled = mainServiceId !== null && mainServiceId !== serviceId;
        } else if (interiorIds.has(serviceId)) {
          if (allowInterior === true) checkbox.disabled = false;
          else if (allowInterior === 's4') checkbox.disabled = serviceId !== 's4';
          else checkbox.disabled = true;
        } else if (waxIds.has(serviceId)) {
          if (!allowWax || allowWax === false) checkbox.disabled = true;
          else if (waxRestriction === 'none') checkbox.disabled = true;
          else if (waxRestriction === 'exclude_s6') checkbox.disabled = (serviceId === 's6');
          else checkbox.disabled = false;
        } else if (glassCoatingIds.has(serviceId)) {
          checkbox.disabled = disabledGlassCoating;
        } else if (wheelCoatingIds.has(serviceId)) {
          checkbox.disabled = disabledWheelCoating;
        } else if (addonIds.has(serviceId)) {
          if (disableAllAddons) checkbox.disabled = true;
          else if (allowAddons === true) checkbox.disabled = false;
          else if (allowAddons === 'limited') checkbox.disabled = !['s14', 's15', 's16'].includes(serviceId);
          else checkbox.disabled = true;
        }
      });
    }

    function applyServiceStyling() {
      const labels = document.querySelectorAll('.service-label');
      labels.forEach(label => {
        const serviceId = label.dataset.serviceId;
        const checkbox = document.getElementById(serviceId);
        if (checkbox.disabled) label.classList.add('grayed-out');
        else label.classList.remove('grayed-out');
      });
    }

    function goToStep(step) {
      currentStep = step;
      document.querySelectorAll('.step-section').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${step}`).classList.add('active');

      if (step === 2) document.querySelector('.service-philosophy').style.display = 'none';
      else if (step === 1) document.querySelector('.service-philosophy').style.display = 'grid';
    }

    async function submitBooking() {
      if (!bookingToken) {
        showToast('❌ 預約連結無效，請從 LINE 重新進入');
        return;
      }

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const lineId = document.getElementById('lineId').value.trim();
      const selectedServices = Array.from(document.querySelectorAll('.service-checkbox:checked')).map(cb => cb.value);

      if (!name || !phone || !lineId) {
        showToast('❌ 請填寫所有欄位');
        return;
      }
      if (!selectedDate) {
        showToast('❌ 請選擇日期');
        return;
      }
      if (!selectedTime) {
        showToast('❌ 請選擇時段');
        return;
      }
      if (selectedServices.length === 0) {
        showToast('❌ 請選擇服務');
        return;
      }

      const bookingData = {
        booking_token: bookingToken,
        customer_name: name,
        customer_phone: phone,
        customer_line: lineId,
        booking_date: selectedDate,
        booking_time: selectedTime,
        service_name: selectedServices.join('、'),
        service_items: selectedServices.join('、'),
        created_at: new Date().toISOString()
      };

      try {
        const response = await fetch('/api/create-booking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bookingData)
        });

        const result = await response.json();
        if (!response.ok) {
          showToast(`❌ ${result.message || '預約失敗'}`);
          return;
        }

        showToast('✅ 預約已送出');
        document.getElementById('lineModal').classList.add('active');
        await loadBookingsFromApi();
        resetForm();
        generateDateGrid();
        generateTimeGrid();
        goToStep(1);
      } catch (error) {
        console.error('submitBooking error:', error);
        showToast('❌ 預約送出失敗，請稍後再試');
      }
    }

    function resetForm() {
      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('lineId').value = '';
      document.querySelectorAll('.service-checkbox').forEach(cb => cb.checked = false);
      selectedDate = null;
      selectedTime = null;
      selectedMainService = null;
      updatePriceDisplay();
    }

    function loadPrices() {
      document.getElementById('priceContent').innerHTML = '<div style="color:#ccc;line-height:1.8;font-size:14px;">費用資訊保留你原本 Canva 呈現方式，正式部署可繼續沿用完整內容。</div>';
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function updatePriceDisplay() {
      const selectedServices = Array.from(document.querySelectorAll('.service-checkbox:checked')).map(cb => cb.dataset.serviceId);
      const priceDisplay = document.getElementById('priceDisplay');
      const bikeAddonsNote = document.getElementById('bikeAddonsNote');
      if (!selectedServices.length) {
        priceDisplay.style.display = 'none';
        bikeAddonsNote.style.display = 'none';
        return;
      }

      let minPrice = 0;
      let maxPrice = 0;
      selectedServices.forEach(serviceId => {
        if (servicePrices[serviceId]) {
          minPrice += servicePrices[serviceId][0];
          maxPrice += servicePrices[serviceId][1];
        }
      });

      document.getElementById('priceRange').textContent = `$${minPrice.toLocaleString()} ~ $${maxPrice.toLocaleString()}`;
      document.getElementById('priceNote').textContent = '⚠️ 依車況、車型評估，實際價格會有變動';
      document.getElementById('priceEstimateWarning').textContent = '💡 此為預估金額，實際費用依車況評估';
      priceDisplay.style.display = 'block';
    }

    async function initPage() {
      bookingToken = validateBookingToken();
      await loadBookingsFromApi();
      generateDateGrid();
      generateTimeGrid();
      generateServiceGrid();
      loadPrices();
      setupAllEventListeners();
      if (!bookingToken) showToast('⚠️ 預約連結無效，請從 LINE 的預約連結重新進入');
    }

    initPage();
  </script>
</body>
</html>
